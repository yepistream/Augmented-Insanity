//
// Builds the noop sample .augins package.
//
//   gradlew :samples:augins-noop:packageNoopAugins   # produces build/noop.augins
//   gradlew :samples:augins-noop:installNoopAugins   # builds + adb pushes to device
//
// Deliberately NOT an Android Library / com.android.application Ã¢â‚¬â€ those
// repackage the .so into an AAR/APK and would strip our non-"lib*" name. We
// drive the NDK CMake directly via Exec tasks instead.

import java.util.Properties

def localProps = new Properties()
def localPropsFile = file("${rootDir}/local.properties")
if (localPropsFile.exists()) {
    localPropsFile.withInputStream { localProps.load(it) }
}
def sdkDir = localProps.getProperty('sdk.dir') ?:
        System.getenv('ANDROID_SDK_ROOT') ?:
        System.getenv('ANDROID_HOME')
if (sdkDir == null) {
    throw new GradleException(
        "Cannot locate Android SDK. Set sdk.dir in local.properties or " +
        "ANDROID_SDK_ROOT/ANDROID_HOME in the environment.")
}

def isWindows = System.properties['os.name'].toLowerCase().contains('windows')
def exeExt = isWindows ? '.exe' : ''

def ndkRoot = "${sdkDir}/ndk/${rootProject.ext.ndk_version}"
def cmakeBin = "${sdkDir}/cmake/${rootProject.ext.cmake_version}/bin/cmake${exeExt}"
def ninjaBin = "${sdkDir}/cmake/${rootProject.ext.cmake_version}/bin/ninja${exeExt}"

def buildOutDir = layout.buildDirectory.dir('cmake').get().asFile
def soFile = new File(buildOutDir, 'com.augmented_insanity.samples.noop.so')
def augInsFile = layout.buildDirectory.file('noop.augins').get().asFile

// outOfProcess flavor of the runtime APK; matches the applicationIdSuffix
// in src/xrt/targets/openxr_android/build.gradle.
def runtimePackageId = 'com.augmented_insanity.runtime.out_of_process'

tasks.register('configureNoop', Exec) {
    inputs.file 'CMakeLists.txt'
    inputs.file 'noop.cpp'
    outputs.file new File(buildOutDir, 'CMakeCache.txt')

    doFirst { buildOutDir.mkdirs() }

    commandLine cmakeBin,
        '-G', 'Ninja',
        "-DCMAKE_TOOLCHAIN_FILE=${ndkRoot}/build/cmake/android.toolchain.cmake",
        '-DANDROID_ABI=arm64-v8a',
        "-DANDROID_PLATFORM=android-${rootProject.ext.sharedMinSdk}",
        "-DCMAKE_MAKE_PROGRAM=${ninjaBin}",
        '-DCMAKE_BUILD_TYPE=Release',
        '-S', file('.').absolutePath,
        '-B', buildOutDir.absolutePath
}

tasks.register('buildNoop', Exec) {
    dependsOn 'configureNoop'
    inputs.file 'noop.cpp'
    outputs.file soFile
    commandLine cmakeBin, '--build', buildOutDir.absolutePath
}

tasks.register('packageNoopAugins', Zip) {
    dependsOn 'buildNoop'
    archiveFileName = 'noop.augins'
    destinationDirectory = layout.buildDirectory
    from(buildOutDir) {
        include '*.so'
    }
    from('.') {
        include 'metadata.json', 'settings.json'
    }
}

// Pushing into /sdcard/Android/data/<pkg>/files/ has been blocked since
// Android 11 (scoped storage). Instead: push to /data/local/tmp/ Ã¢â‚¬â€ which
// is always world-readable and adb-writable Ã¢â‚¬â€ then `run-as` the debuggable
// runtime APK to copy the file into its private files/modules/ dir.
tasks.register('installNoopAugins') {
    dependsOn 'packageNoopAugins'

    doLast {
        def tmpRemote = "/data/local/tmp/noop.augins"

        exec { commandLine 'adb', 'push', augInsFile.absolutePath, tmpRemote }
        exec {
            commandLine 'adb', 'shell',
                "run-as ${runtimePackageId} mkdir -p files/modules"
        }
        exec {
            commandLine 'adb', 'shell',
                "run-as ${runtimePackageId} cp ${tmpRemote} files/modules/noop.augins"
        }
        exec { commandLine 'adb', 'shell', "rm ${tmpRemote}" }

        println "Pushed noop.augins into ${runtimePackageId}/files/modules/"
    }
}

tasks.register('clean') {
    doLast { delete layout.buildDirectory }
}
